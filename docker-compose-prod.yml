x-common: &common
  ulimits:
    nofile:
      soft: 1048576
      hard: 1048576
  restart: always
  networks:
    - infra-billing-network

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: 100m
      max-file: 5

x-env: &env
  env_file: .env

services:
  infra-billing:
    image: ghcr.io/mishkatik/infra-billing:latest
    container_name: infra-billing
    hostname: infra-billing
    <<: [*common, *logging, *env]
    environment:
      - TZ=UTC
    ports:
      - 127.0.0.1:8080:${PORT:-8080}
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://127.0.0.1:${PORT:-8080}/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      infra-billing-db:
        condition: service_healthy

  infra-billing-db:
    image: postgres:17.6
    container_name: infra-billing-db
    hostname: infra-billing-db
    <<: [*common, *logging, *env]
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-infra}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-infra}
      - POSTGRES_DB=${POSTGRES_DB:-infra_billing}
      - TZ=UTC
    ports:
      - 127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432
    volumes:
      - infra-billing-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 3s
      timeout: 10s
      retries: 3

networks:
  infra-billing-network:
    name: infra-billing-network
    driver: bridge
    external: false

volumes:
  infra-billing-db-data:
    name: infra-billing-db-data
    driver: local
    external: false
